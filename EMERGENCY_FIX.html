<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
        }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .warning { background: #fef3c7; color: #92400e; }
        .info { background: #dbeafe; color: #1e40af; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover { background: #1d4ed8; }
        pre {
            background: #1f2937;
            color: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .test-result {
            margin: 10px 0;
            padding: 15px;
            border-left: 4px solid #2563eb;
            background: #f9fafb;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h1>🔧 Supabase Connection Diagnostic</h1>
        <p>This tool will help diagnose and fix the database connection issue.</p>
        <button onclick="runFullDiagnostic()">Run Full Diagnostic</button>
        <button onclick="location.href='survey.html'">Back to Survey</button>
    </div>

    <div id="results"></div>

    <!-- Load Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    
    <script>
        const SUPABASE_URL = 'https://jwfyumswseoczupzixkm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3Znl1bXN3c2VvY3p1cHppeGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzODYzNzksImV4cCI6MjA4Mzk2MjM3OX0.dwKnGJicY3gOgWSHX1V4Jibr1GzGN07vd5VZ8_50-B8';

        let supabase;
        let results = [];

        function addResult(title, status, message, details = null) {
            results.push({ title, status, message, details });
            displayResults();
        }

        function displayResults() {
            const container = document.getElementById('results');
            container.innerHTML = results.map(r => `
                <div class="test-box">
                    <div class="test-result">
                        <h3>${r.title}</h3>
                        <div class="status ${r.status}">${r.message}</div>
                        ${r.details ? `<pre>${JSON.stringify(r.details, null, 2)}</pre>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function runFullDiagnostic() {
            results = [];
            addResult('Starting Diagnostic', 'info', 'Running comprehensive connection tests...');

            // Test 1: Check if Supabase library loaded
            await new Promise(resolve => setTimeout(resolve, 100));
            if (typeof window.supabase === 'undefined' && typeof window.supabaseLib === 'undefined') {
                addResult('Test 1: Library Load', 'error', 'Supabase library did not load', {
                    hasSupabase: typeof window.supabase !== 'undefined',
                    hasSupabaseLib: typeof window.supabaseLib !== 'undefined'
                });
                return;
            } else {
                addResult('Test 1: Library Load', 'success', '✅ Supabase library loaded successfully');
            }

            // Test 2: Initialize Client
            try {
                supabase = window.supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                addResult('Test 2: Client Initialization', 'success', '✅ Supabase client created', {
                    hasFromMethod: typeof supabase.from === 'function',
                    clientType: typeof supabase
                });
            } catch (error) {
                addResult('Test 2: Client Initialization', 'error', '❌ Failed to create client', {
                    error: error.message,
                    stack: error.stack
                });
                return;
            }

            // Test 3: Test Connection
            try {
                addResult('Test 3: Connection Test', 'info', 'Testing connection to Supabase...');
                const { error } = await supabase.from('survey_responses').select('id').limit(0);
                
                if (error) {
                    if (error.message.includes('Could not find the table') || 
                        error.message.includes('does not exist') ||
                        error.message.includes('relation')) {
                        addResult('Test 3: Connection Test', 'warning', '⚠️ Table does not exist - need to run migration', {
                            errorCode: error.code,
                            errorMessage: error.message,
                            solution: 'Run ONE_STEP_FIX.sql in Supabase SQL Editor'
                        });
                    } else if (error.message.includes('permission') || error.message.includes('RLS')) {
                        addResult('Test 3: Connection Test', 'success', '✅ Connection successful (RLS active)', {
                            note: 'This is expected - RLS prevents reading but allows insertion'
                        });
                    } else {
                        addResult('Test 3: Connection Test', 'error', '❌ Connection failed', {
                            errorCode: error.code,
                            errorMessage: error.message
                        });
                    }
                } else {
                    addResult('Test 3: Connection Test', 'success', '✅ Connection successful - table exists!');
                }
            } catch (error) {
                addResult('Test 3: Connection Test', 'error', '❌ Network or connection error', {
                    error: error.message,
                    type: error.name
                });
            }

            // Test 4: Test Insert (with fake data)
            try {
                addResult('Test 4: Insert Test', 'info', 'Testing insert capability...');
                const testPayload = {
                    vardas: 'Test User',
                    el_pastas: 'test@example.com',
                    telefonas: '+37060000000',
                    type: 'lauko',
                    miestas: 'Test City'
                };
                
                const { error } = await supabase.from('survey_responses').insert([testPayload]);
                
                if (error) {
                    addResult('Test 4: Insert Test', 'error', '❌ Insert failed', {
                        errorCode: error.code,
                        errorMessage: error.message,
                        hint: error.hint
                    });
                } else {
                    addResult('Test 4: Insert Test', 'success', '✅ Insert successful - database is ready!');
                    addResult('Summary', 'success', '🎉 All tests passed! The survey should work now.', {
                        recommendation: 'Go back to survey.html and try submitting'
                    });
                }
            } catch (error) {
                addResult('Test 4: Insert Test', 'error', '❌ Insert test failed', {
                    error: error.message
                });
            }
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runFullDiagnostic, 500);
        });
    </script>
</body>
</html>
